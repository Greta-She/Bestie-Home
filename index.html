<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZZ & MM 🎬</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: "Helvetica Neue";
    overflow-x: hidden;
}

/* 🌌 暗角 */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 40%, black 90%);
    pointer-events: none;
}

/* 🎬 开场 */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ⌨️ 打字机 */
.typewriter {
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 3s steps(25) forwards, blink 1s infinite;
}

@keyframes typing {
    to { width: 260px; }
}
@keyframes blink {
    50% { border-color: transparent; }
}

/* 📸 图片 */
.gallery {
    display: flex;
    gap: 20px;
    justify-content: center;
    padding: 40px;
}

.gallery img {
    width: 220px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.4s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* 🖼️ 全屏查看 */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
}

/* 🎞️ 滚动渐显 */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* 🎂 */
.moments {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
    padding: 40px;
}

.moment {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 10px;
}

/* 🍷 微醺 */
.wine {
    position: relative;
    height: 400px;
}

.wine img {
    position: absolute;
    width: 120px;
    cursor: pointer;
    transition: 0.3s;
}

.wine img:hover {
    transform: scale(1.15);
}

/* 散落布局 */
.wine img:nth-child(1){ top:10%; left:20%;}
.wine img:nth-child(2){ top:30%; left:60%;}
.wine img:nth-child(3){ top:60%; left:30%;}
.wine img:nth-child(4){ top:20%; left:80%;}
.wine img:nth-child(5){ top:70%; left:70%;}
.wine img:nth-child(6){ top:50%; left:10%;}
.wine img:nth-child(7){ top:80%; left:40%;}
.wine img:nth-child(8){ top:40%; left:50%;}

</style>
</head>

<body>

<!-- 🎬 开场 -->
<div class="hero">
    <h1 class="typewriter">ZZ & MM 的故事 🎬</h1>
</div>

<!-- 📸 -->
<div class="gallery fade">
    <img src="https://images.unsplash.com/photo-1516961642265-531546e84af2">
    <img src="https://images.unsplash.com/photo-1529619768328-e37af76c6fe5">
</div>

<!-- 💬 -->
<div class="fade" style="text-align:center;">
    <h2>我们说过的话</h2>
    <p>你一直在，我就不怕。</p>
</div>

<!-- 🎂 -->
<div class="moments fade">
    <div class="moment">十八岁的惊喜 🎉</div>
    <div class="moment">大学毕业 🎓</div>
    <div class="moment">第一次旅行 ✈️</div>
    <div class="moment">陪我搬家 🏠</div>
</div>

<!-- 🍷 -->
<div class="wine fade">
    <img src="https://via.placeholder.com/120">
    <img src="https://via.placeholder.com/120">
    <img src="https://via.placeholder.com/120">
    <img src="https://via.placeholder.com/120">
    <img src="https://via.placeholder.com/120">
    <img src="https://via.placeholder.com/120">
    <img src="https://via.placeholder.com/120">
    <img src="https://via.placeholder.com/120">
</div>

<!-- 🖼️ 弹出层 -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
</div>

<script>
try {
    /* 🎞️ 滚动动画（更丝滑） */
    const fades = document.querySelectorAll(".fade");

    window.addEventListener("scroll", () => {
        requestAnimationFrame(() => {
            fades.forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 100) {
                    el.classList.add("show");
                }
            });
        });
    });

    /* 📸 只绑定指定图片（修复卡死） */
    const images = document.querySelectorAll(".gallery img, .wine img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    if (lightbox && lightboxImg) {
        images.forEach(img => {
            img.addEventListener("click", () => {
                lightbox.style.display = "flex";
                lightboxImg.src = img.src;
            });
        });

        lightbox.addEventListener("click", () => {
            lightbox.style.display = "none";
        });
    }

} catch (e) {
    console.error("页面JS错误:", e);
}
</script>

</body>
</html>
