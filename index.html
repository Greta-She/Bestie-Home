<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZZ & MM 的小窝 🏠</title>
    <style>
        /* --- 基础样式 --- */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #666;
        }
        .heart {
            color: #ff6b6b;
            font-size: 3em;
            animation: beat 1s infinite alternate;
            display: inline-block;
            margin: 20px 0;
        }
        @keyframes beat {
            to { transform: scale(1.2); }
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #999;
        }
        button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        button:hover {
            background-color: #ff5252;
        }

        /* --- 照片墙专用样式 (已修复位置) --- */
        .gallery {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .photo-card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 200px;
            transition: transform 0.3s;
        }
        .photo-card:hover {
            transform: translateY(-5px);
        }
        .photo-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        .caption {
            margin-top: 10px;
            font-size: 0.9em;
            color: #555;
            font-weight: bold;
        }
        .gallery h2 {
            width: 100%;
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 标题 -->
        <h1>欢迎来到 ZZ 和 MM 的记忆仓库</h1>
        
        <!-- 跳动的爱心 -->
        <div class="heart">❤️</div>

        <!-- 正文内容 -->
        <p>
            这里是我们专属的小天地。<br>
            记录生活中的点点滴滴，收藏每一个值得纪念的瞬间。
        </p>

        <!-- 互动按钮 -->
        <button onclick="alert('谢谢你访问我们的小家！🎉')">
            点击送给我们一朵小花 🌸
        </button>

        <!-- 📷 照片墙区域 (只保留一份) -->
        <div class="gallery">
            <h2>📸 我们的珍贵瞬间</h2>
            
            <!-- 照片卡片 1 -->
            <div class="photo-card">
                <!-- ⚠️ 记得替换这里的 src 链接 -->
                <img src="https://images.unsplash.com/photo-1516961642265-531546e84af2?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="我们的合照">
                <div class="caption">第一次一起去旅行 ✈️</div>
            </div>

            <!-- 照片卡片 2 -->
            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1529619768328-e37af76c6fe5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="开心的时刻">
                <div class="caption">那个笑得超开心的下午 😄</div>
            </div>

            <!-- 照片卡片 3 -->
            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="温馨日常">
                <div class="caption">平凡又温馨的日常 🍲</div>
            </div>
        </div>
        <!-- 📷 照片墙结束 -->

        <!-- 底部署名 -->
        <div class="footer">
            Created with love by ZZ & MM • 2026
        </div>
    </div>

</body>
</html>
