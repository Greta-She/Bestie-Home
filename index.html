<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZZ & MM 🎬</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: "Helvetica Neue";
    overflow-x: hidden;
}

/* 🌌 动态星空（不卡关键） */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveStars 60s linear infinite;
    opacity: 0.3;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-500px,-500px); }
}

/* 🌌 暗角 */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 40%, black 90%);
    pointer-events: none;
}

/* 🎬 开场 */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ⌨️ 打字机 */
.typewriter {
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 3s steps(25) forwards, blink 1s infinite;
}

@keyframes typing {
    to { width: 260px; }
}
@keyframes blink {
    50% { border-color: transparent; }
}

/* 🎞️ 分幕标题 */
.section-title {
    text-align: center;
    font-size: 28px;
    margin-top: 80px;
    letter-spacing: 2px;
    opacity: 0.8;
}

/* 📸 图片 */
.gallery {
    display: flex;
    gap: 20px;
    justify-content: center;
    padding: 40px;
}

.gallery img {
    width: 220px;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.5s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* 🖼️ 全屏查看 */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
}

/* 🎞️ 滚动动画 */
.fade {
    opacity: 0;
    transform: translateY(60px);
    transition: 1.2s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* 🎂 */
.moments {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
    padding: 40px;
}

.moment {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
}

/* 🍷 微醺（星星散落） */
.wine {
    position: relative;
    height: 400px;
}

.wine img {
    position: absolute;
    width: 100px;
    transition: 0.4s;
    cursor: pointer;
}

.wine img:hover {
    transform: scale(1.2) rotate(5deg);
}

/* 随机感更强 */
.wine img:nth-child(1){ top:10%; left:15%;}
.wine img:nth-child(2){ top:25%; left:70%;}
.wine img:nth-child(3){ top:60%; left:20%;}
.wine img:nth-child(4){ top:15%; left:85%;}
.wine img:nth-child(5){ top:70%; left:65%;}
.wine img:nth-child(6){ top:50%; left:5%;}
.wine img:nth-child(7){ top:85%; left:40%;}
.wine img:nth-child(8){ top:35%; left:45%;}

</style>
</head>

<body>

<!-- 🎬 开场 -->
<div class="hero">
    <h1 class="typewriter">ZZ & MM 的故事 🎬</h1>
</div>

<!-- 📸 -->
<div class="section-title fade">我们的瞬间</div>
<div class="gallery fade">
    <img loading="lazy" src="https://images.unsplash.com/photo-1516961642265-531546e84af2?w=800">
    <img loading="lazy" src="https://images.unsplash.com/photo-1529619768328-e37af76c6fe5?w=800">
</div>

<!-- 💬 -->
<div class="section-title fade">我们说过的话</div>
<div class="fade" style="text-align:center;">
    <p>你一直在，我就不怕。</p>
</div>

<!-- 🎂 -->
<div class="section-title fade">重要时刻</div>
<div class="moments fade">
    <div class="moment">十八岁的惊喜 🎉</div>
    <div class="moment">大学毕业 🎓</div>
    <div class="moment">第一次旅行 ✈️</div>
    <div class="moment">陪我搬家 🏠</div>
</div>

<!-- 🍷 -->
<div class="section-title fade">微醺时刻</div>
<div class="wine fade">
    <img loading="lazy" src="https://via.placeholder.com/100">
    <img loading="lazy" src="https://via.placeholder.com/100">
    <img loading="lazy" src="https://via.placeholder.com/100">
    <img loading="lazy" src="https://via.placeholder.com/100">
    <img loading="lazy" src="https://via.placeholder.com/100">
    <img loading="lazy" src="https://via.placeholder.com/100">
    <img loading="lazy" src="https://via.placeholder.com/100">
    <img loading="lazy" src="https://via.placeholder.com/100">
</div>

<!-- 🖼️ -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
</div>

<script>
const fades = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
    requestAnimationFrame(() => {
        fades.forEach(el => {
            if (el.getBoundingClientRect().top < window.innerHeight - 80) {
                el.classList.add("show");
            }
        });
    });
});

const images = document.querySelectorAll(".gallery img, .wine img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
    img.onclick = () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
    };
});

lightbox.onclick = () => {
    lightbox.style.display = "none";
};
</script>

</body>
</html>
